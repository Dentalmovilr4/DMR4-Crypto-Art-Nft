<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMR4 Crypto Art Gallery</title>
    <style>
        body {
            background-color: #050505;
            color: #00f2ff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            text-shadow: 0 0 15px #00f2ff, 0 0 30px #00f2ff;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #ff00e5;
            text-shadow: 0 0 10px #ff00e5;
            margin-bottom: 30px;
            font-weight: bold;
        }
        #nft-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }
        .nft-card {
            background: #111;
            border: 1px solid #00f2ff;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
            transition: all 0.3s ease;
            text-align: center;
        }
        .nft-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
            border-color: #ff00e5;
        }
        .nft-card img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            border: 1px solid #333;
        }
        .nft-card h3 {
            margin: 15px 0 10px;
            font-size: 1.2rem;
        }
        .nft-card p {
            color: #ccc;
            font-size: 0.9rem;
            height: 40px;
            overflow: hidden;
        }
        .tag {
            background: #ff00e5;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>DMR4 Crypto Art</h1>
    <div class="subtitle">NFT Collection - Cesar</div>

    <div id="nft-container">
        </div>

    <script>
        // Configuración: Define cuántos NFTs tienes planeado mostrar
        const totalNFTs = 22; // Cambia este número según cuántos archivos .json tengas
        const container = document.getElementById('nft-container');

        async function loadNFTs() {
            for (let i = 1; i <= totalNFTs; i++) {
                try {
                    // Ruta a tus archivos JSON en el repositorio
                    const response = await fetch(`metadata/${i}.json`);
                    if (!response.ok) continue;
                    
                    const data = await response.json();

                    // Crear la tarjeta visual
                    const card = document.createElement('div');
                    card.className = 'nft-card';
                    
                    card.innerHTML = `
                        <img src="${data.image}" alt="${data.name}" onerror="this.src='https://via.placeholder.com/300?text=Cargando+Arte...'">
                        <h3>${data.name}</h3>
                        <p>${data.description}</p>
                        <div class="tag">${data.attributes[0]?.value || 'DMR4 Original'}</div>
                    `;
                    
                    container.appendChild(card);
                } catch (error) {
                    console.log("Error cargando el NFT " + i, error);
                }
            }
        }

        loadNFTs();
    </script>
</body>
</html>
