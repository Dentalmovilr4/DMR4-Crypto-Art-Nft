<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMR4 Crypto Art Gallery</title>
    <style>
        body {
            background-color: #050505;
            color: #00f2ff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            text-shadow: 0 0 15px #00f2ff, 0 0 30px #00f2ff;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #ff00e5;
            text-shadow: 0 0 10px #ff00e5;
            margin-bottom: 20px;
            font-weight: bold;
        }
        /* Estilo para el botón de billetera */
        .wallet-btn {
            background: transparent;
            color: #00f2ff;
            border: 2px solid #00f2ff;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
            transition: 0.3s;
            margin-bottom: 30px;
        }
        .wallet-btn:hover {
            background: #00f2ff;
            color: #050505;
            box-shadow: 0 0 20px #00f2ff;
        }
        #wallet-address {
            font-size: 0.8rem;
            color: #ff00e5;
            margin-bottom: 20px;
            word-break: break-all;
            max-width: 300px;
        }
        #nft-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }
        .nft-card {
            background: #111;
            border: 1px solid #00f2ff;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
            transition: all 0.3s ease;
            text-align: center;
        }
        .nft-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
            border-color: #ff00e5;
        }
        .nft-card img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            border: 1px solid #333;
        }
        .nft-card h3 {
            margin: 15px 0 10px;
            font-size: 1.2rem;
        }
        .nft-card p {
            color: #ccc;
            font-size: 0.9rem;
            height: 40px;
            overflow: hidden;
        }
        .tag {
            background: #ff00e5;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>DMR4 Crypto Art</h1>
    <div class="subtitle">NFT Collection - Cesar</div>

    <button class="wallet-btn" id="connectWallet">CONECTAR BILLETERA</button>
    <div id="wallet-address"></div>

    <div id="nft-container"></div>

    <script>
        // Configuración de Billetera
        const connectBtn = document.getElementById('connectWallet');
        const walletDisplay = document.getElementById('wallet-address');
        
        // Tu billetera de DMR4 Coin (Solana)
        const dmr4Wallet = "3CThGZU6DA6CdRMeYqnW12rtpudL9TgQPFT7qqu4NJ84";

        connectBtn.addEventListener('click', async () => {
            if (window.solana && window.solana.isPhantom) {
                try {
                    const resp = await window.solana.connect();
                    walletDisplay.innerHTML = "Conectado: " + resp.publicKey.toString().substring(0, 6) + "..." + resp.publicKey.toString().substring(38);
                    connectBtn.innerHTML = "BILLETERA VINCULADA";
                } catch (err) {
                    console.log("Conexión cancelada");
                }
            } else {
                // Si no hay billetera, mostramos tu dirección para soporte/donaciones
                walletDisplay.innerHTML = "Billetera DMR4 (SOL): <br>" + dmr4Wallet;
                alert("Instala Phantom Wallet para conectar, o usa la dirección en pantalla.");
            }
        });

        // Configuración de carga de NFTs
        const totalNFTs = 24; 
        const container = document.getElementById('nft-container');

        async function loadNFTs() {
            for (let i = 1; i <= totalNFTs; i++) {
                try {
                    const response = await fetch(`metadata/${i}.json`);
                    if (!response.ok) continue;

                    const data = await response.json();

                    const card = document.createElement('div');
                    card.className = 'nft-card';

                    card.innerHTML = `
                        <img src="${data.image}" alt="${data.name}" onerror="this.src='https://via.placeholder.com/300?text=Cargando+Arte...'">
                        <h3>${data.name}</h3>
                        <p>${data.description}</p>
                        <div class="tag">${data.attributes[0]?.value || 'DMR4 Original'}</div>
                    `;

                    container.appendChild(card);
                } catch (error) {
                    console.log("Error cargando el NFT " + i, error);
                }
            }
        }

        loadNFTs();
    </script>
</body>
</html>
